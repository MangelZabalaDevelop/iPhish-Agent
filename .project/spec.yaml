specVersion: v2
specMinorVersion: 2
meta:
    name: iphish-agent
    image: project-iphish-agent
    description: Hermes-powered local AI agent on Dell Pro Max with GB10, packaged with NVIDIA AI Workbench and OpenShell guardrails for authorized phishing-awareness simulation.
    labels:
        - dell-pro-max-gb10
        - nvidia-ai-workbench
        - hermes-agent
        - openshell
        - phishing-awareness
    createdOn: "2026-06-11T14:07:50Z"
    defaultBranch: main
layout:
    - path: code/
      type: code
      storage: git
    - path: models/
      type: models
      storage: gitlfs
    - path: data/
      type: data
      storage: gitlfs
    - path: data/scratch/
      type: data
      storage: gitignore
environment:
    base:
        registry: nvcr.io
        image: nvidia/ai-workbench/python-basic:1.0.9
        build_timestamp: "20260112183658"
        name: Python Basic
        supported_architectures: []
        cuda_version: ""
        description: A Python Base with Jupyterlab
        entrypoint_script: ""
        labels:
            - ubuntu
            - python3
        apps: []
        programming_languages:
            - python3
        icon_url: https://workbench.download.nvidia.com/static/img/ai-workbench-icon-rectangle.jpg
        image_version: 1.0.9
        os: linux
        os_distro: ubuntu
        os_distro_release: "22.04"
        schema_version: v2
        user_info:
            uid: ""
            gid: ""
            username: ""
        package_managers:
            - name: apt
              binary_path: /usr/bin/apt
              installed_packages:
                - curl
                - git
                - git-lfs
                - python3
                - gcc
                - python3-dev
                - python3-pip
                - vim
            - name: pip
              binary_path: /usr/bin/pip
              installed_packages:
                - jupyterlab==4.3.6
        package_manager_environment:
            name: ""
            target: ""
    compose_file_path: ""
execution:
    apps:
        - name: Iphish
          type: custom
          class: webapp
          start_command: bash -lc '/project/scripts/hermes_workbench.sh start'
          health_check_command: bash -lc '/project/scripts/hermes_workbench.sh health'
          stop_command: bash -lc '/project/scripts/hermes_workbench.sh stop'
          user_msg: 'Iphish is ready: {{URL}}'
          logfile_path: /project/logs/iphish-agent.log
          timeout_seconds: 600
          icon_url: ""
          webapp_options:
            autolaunch: true
            port: "9120"
            proxy:
                trim_prefix: true
            url_command: bash -lc 'echo http://127.0.0.1:9120/'
        - name: GoPhish
          type: custom
          class: webapp
          start_command: bash -lc '/project/scripts/hermes_workbench.sh start-gophish'
          health_check_command: bash -lc '/project/scripts/hermes_workbench.sh gophish-health'
          stop_command: bash -lc '/project/scripts/hermes_workbench.sh stop-gophish'
          user_msg: 'GoPhish is ready: {{URL}}'
          logfile_path: /project/logs/iphish-agent.log
          timeout_seconds: 120
          icon_url: ""
          webapp_options:
            autolaunch: true
            port: "3334"
            proxy:
                trim_prefix: false
            url_command: bash -lc 'echo http://127.0.0.1:3334/projects/iphish-agent/applications/GoPhish/'
        - name: Mailpit
          type: custom
          class: webapp
          start_command: bash -lc '/project/scripts/hermes_workbench.sh start-mailpit'
          health_check_command: bash -lc '/project/scripts/hermes_workbench.sh mailpit-health'
          stop_command: bash -lc '/project/scripts/hermes_workbench.sh stop-mailpit'
          user_msg: 'Mailpit is ready: {{URL}}'
          logfile_path: /project/logs/iphish-agent.log
          timeout_seconds: 120
          icon_url: ""
          webapp_options:
            autolaunch: true
            port: "8025"
            proxy:
                trim_prefix: false
            url_command: bash -lc 'echo http://127.0.0.1:8025/projects/iphish-agent/applications/Mailpit/'
        - name: ComfyUI
          type: custom
          class: webapp
          start_command: bash -lc '/project/scripts/hermes_workbench.sh start-comfyui'
          health_check_command: bash -lc '/project/scripts/hermes_workbench.sh comfyui-health'
          stop_command: bash -lc '/project/scripts/hermes_workbench.sh stop-comfyui'
          user_msg: 'ComfyUI is ready: {{URL}}'
          logfile_path: /project/logs/iphish-agent.log
          timeout_seconds: 2400
          icon_url: ""
          webapp_options:
            autolaunch: true
            port: "8188"
            proxy:
                trim_prefix: true
            url_command: bash -lc 'echo http://127.0.0.1:8188/'
    resources:
        gpu:
            requested: 1
        sharedMemoryMB: 0
    secrets: []
    mounts:
        - type: project
          target: /project/
          description: Project directory
          options: rw
        - type: host
          target: /host-run/
          description: Host runtime directory for Docker socket used to run the Hermes container
          options: rw
